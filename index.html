<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Taskly — A clean, minimal task manager to keep you focused and productive."
    />
    <title>Taskly — Stay on Top of Your Day</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ===== HEADER ===== -->
    <header class="site-header">
      <div class="container">
        <div class="header-inner">
          <div class="logo">
            <span class="logo-icon" aria-hidden="true">✦</span>
            <span class="logo-text">Taskly</span>
          </div>
          <p class="header-tagline">Your tasks, beautifully managed.</p>
        </div>
      </div>
    </header>

    <!-- ===== MAIN ===== -->
    <main class="main-content">
      <div class="container">

        <!-- KPI SECTION -->
        <section class="kpi-section" aria-label="Task statistics">
          <div class="kpi-card" id="kpi-total">
            <div class="kpi-icon-wrap kpi-icon--total" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="3" ry="3"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
            </div>
            <div class="kpi-content">
              <span class="kpi-value" id="count-total">0</span>
              <span class="kpi-label">Total Tasks</span>
            </div>
          </div>

          <div class="kpi-card" id="kpi-completed">
            <div class="kpi-icon-wrap kpi-icon--completed" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </div>
            <div class="kpi-content">
              <span class="kpi-value" id="count-completed">0</span>
              <span class="kpi-label">Completed</span>
            </div>
          </div>

          <div class="kpi-card" id="kpi-uncompleted">
            <div class="kpi-icon-wrap kpi-icon--uncompleted" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="9"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
            </div>
            <div class="kpi-content">
              <span class="kpi-value" id="count-uncompleted">0</span>
              <span class="kpi-label">Remaining</span>
            </div>
          </div>
        </section>

        <!-- PROGRESS BAR -->
        <div class="progress-wrap" aria-label="Task completion progress">
          <div class="progress-meta">
            <span class="progress-label">Progress</span>
            <span class="progress-pct" id="progress-pct">0%</span>
          </div>
          <div class="progress-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" id="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>

        <!-- INPUT SECTION -->
        <section class="input-section" aria-label="Add a new task">
          <div class="input-card">
            <h2 class="input-heading">Add a New Task</h2>
            <div class="input-row">
              <input
                type="text"
                id="task-input"
                class="task-input"
                placeholder="What needs to be done?"
                maxlength="200"
                autocomplete="off"
                aria-label="New task description"
              />
              <button id="add-task-btn" class="btn btn-primary" aria-label="Add task">
                <span class="btn-icon" aria-hidden="true">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                  </svg>
                </span>
                Add Task
              </button>
            </div>
            <p class="input-hint" id="input-hint" aria-live="polite"></p>
          </div>
        </section>

        <!-- FILTER BAR -->
        <div class="filter-bar" role="group" aria-label="Filter tasks">
          <button class="filter-btn active" data-filter="all" id="filter-all">All</button>
          <button class="filter-btn" data-filter="active" id="filter-active">Active</button>
          <button class="filter-btn" data-filter="completed" id="filter-completed">Completed</button>
          <button class="filter-btn btn-clear-all" id="clear-completed-btn" aria-label="Clear all completed tasks">
            Clear Completed
          </button>
        </div>

        <!-- TASK LIST SECTION -->
        <section class="task-section" aria-label="Task list">
          <!-- Empty state -->
          <div class="empty-state" id="empty-state">
            <div class="empty-icon" aria-hidden="true">
              <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
              </svg>
            </div>
            <p class="empty-title" id="empty-title">No tasks yet</p>
            <p class="empty-sub" id="empty-sub">Add your first task above to get started.</p>
          </div>

          <!-- Task list -->
          <ul class="task-list" id="task-list" role="list" aria-label="Tasks"></ul>
        </section>

      </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="site-footer">
      <div class="container">
        <p>Made with <span aria-label="love">♥</span> · Taskly &copy; <span id="footer-year"></span></p>
      </div>
    </footer>

    <!-- TOAST NOTIFICATION -->
    <div class="toast" id="toast" role="alert" aria-live="assertive"></div>

    <script src="app.js"></script>
  </body>
</html>
